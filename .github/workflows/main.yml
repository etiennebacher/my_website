on:
  repository_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Render & Deploy Site

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv run build.py build -f
      - run: |
          curl -L -o cv.pdf https://raw.githubusercontent.com/etiennebacher/CV_perso/master/cv.pdf
          git add cv.pdf
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  # Publish to GitHub Pages
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

